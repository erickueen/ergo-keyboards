name: Build firmware

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: moergo-sc/zmk
          ref: main
          path: src

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-22.05

      - uses: cachix/cachix-action@v14
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true

      - name: Generate keymap SVGs with Nix
        run: nix-build -A keymapSvgs -o generated-keymaps

      - name: Refresh committed SVGs for auto-PR
        if: github.event_name != 'pull_request'
        run: cp -R generated-keymaps/. docs/keymaps/

      - name: Build CI bundle
        run: nix-build -A ci -o ci-build

      - name: Create SVG regeneration PR
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: regenerate keymap SVGs"
          title: Regenerate keymap SVGs
          body: |
            Generated by `nix-build -A keymapSvgs` because committed SVGs differed from the Nix-generated output.
          branch: ci/regenerate-keymap-svgs
          delete-branch: true
          add-paths: docs/keymaps/*.svg

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ci-build/firmware/*.uf2
